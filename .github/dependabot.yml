version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day-of-month: "1"
    open-pull-requests-limit: 1
    groups:
      github_actions_all:
        patterns:
          - "*"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
    ignore:
      - dependency-name: "*"
        update-types:
          [
            "version-update:semver-major",
            "version-update:semver-minor",
            "version-update:semver-patch",
          ]

  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "monthly"
      day-of-month: "1"
    open-pull-requests-limit: 1
    groups:
      cargo_all:
        patterns:
          - "*"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
    ignore:
      - dependency-name: "libp2p"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "embedded-hal"
      - dependency-name: "tower-http"
      - dependency-name: "sha2"
        update-types: ["version-update:semver-major"]
      - dependency-name: "bincode"
        update-types: ["version-update:semver-major"]
      - dependency-name: "uniffi"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "linux-embedded-hal"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "keyring"
        update-types: ["version-update:semver-major"]
      - dependency-name: "rand"
        update-types: ["version-update:semver-major"]
      - dependency-name: "tower"
        update-types: ["version-update:semver-major"]
      - dependency-name: "hkdf"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "axum"
        update-types: ["version-update:semver-major"]
      - dependency-name: "rand_core"
        update-types: ["version-update:semver-major"]
      - dependency-name: "dirs"
        update-types: ["version-update:semver-major"]
      - dependency-name: "zip"
        update-types: ["version-update:semver-major"]
      - dependency-name: "rppal"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "ssd1306"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      # hmac 0.13 requires digest 0.10+ API migration (Hmac::new_from_slice trait changes)
      - dependency-name: "hmac"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
      # Closed without merge — avoid re-opening patch-only desktop bumps
      - dependency-name: "tauri"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "tauri-build"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "tokio"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "uuid"
        update-types: ["version-update:semver-patch"]
