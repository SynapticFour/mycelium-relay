name: Dependency Review

on:
  pull_request:

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Check dependency graph
        id: graph
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api "repos/${{ github.repository }}/dependency-graph/snapshots" --silent

      - name: Dependency Review
        if: steps.graph.outcome == 'success'
        uses: actions/dependency-review-action@v5
