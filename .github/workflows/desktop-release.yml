name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 0.2.0)"
        required: true

jobs:
  build-desktop:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            targets: linux
          - os: windows-2022
            targets: windows
          - os: macos-14
            targets: macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: desktop-${{ matrix.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: crates/mycelium-desktop/ui/package-lock.json

      - name: Install frontend deps
        working-directory: crates/mycelium-desktop/ui
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: crates/mycelium-desktop
          tauriScript: cargo tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: mycelium-${{ matrix.targets }}
          path: |
            crates/mycelium-desktop/target/release/bundle/**/*.msi
            crates/mycelium-desktop/target/release/bundle/**/*.AppImage
            crates/mycelium-desktop/target/release/bundle/**/*.deb
            crates/mycelium-desktop/target/release/bundle/**/*.dmg
