name: Deploy Relay → Fly.io

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Verify MYCELIUM_STORAGE_KEY (stable peer ID)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "::warning::FLY_API_TOKEN not set — skipping Fly deploy."
            exit 0
          fi
          FLY_APP="$(grep -m1 '^app = ' deploy/relay/fly.toml | sed 's/^app = "\(.*\)".*/\1/')"
          if ! fly secrets list -a "$FLY_APP" 2>/dev/null | grep -q 'MYCELIUM_STORAGE_KEY'; then
            echo "::error::MYCELIUM_STORAGE_KEY is not set on Fly app \"$FLY_APP\"."
            echo "Without it the libp2p peer ID changes on redeploy (bootstrap clients break)."
            echo "One-time: fly secrets set MYCELIUM_STORAGE_KEY=\"\$(openssl rand -hex 32)\" -a $FLY_APP"
            echo "See deploy/relay/README.md §5"
            exit 1
          fi

      - name: Deploy to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "Skipping Fly deploy: FLY_API_TOKEN is not set in repository secrets."
            exit 0
          fi
          bash scripts/deploy-relay-fly.sh
