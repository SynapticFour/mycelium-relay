name: Deploy Relay → Fly.io

on:
  push:
    branches: [main]
    paths:
      - 'crates/mycelium-relay/**'
      - 'crates/mycelium-core/**'
      - 'crates/mycelium-node/**'
      - 'deploy/relay/**'
      - 'scripts/deploy-relay-fly.sh'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Dockerfile.relay'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "Skipping Fly deploy: FLY_API_TOKEN is not set in repository secrets."
            exit 0
          fi
          bash scripts/deploy-relay-fly.sh
