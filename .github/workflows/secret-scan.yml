name: Secret Scan

on:
  pull_request:
  push:
    branches: [main, master]
  schedule:
    - cron: "35 3 * * 1"

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Avoid gitleaks-action push diff mode: it can fail on first-parent ranges when
      # the event "before" SHA has no parent (e.g. initial import). Full-tree detect is stable.
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: "8.24.3"
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tgz
          tar -xzf /tmp/gitleaks.tgz -C /tmp
          sudo install -m755 /tmp/gitleaks /usr/local/bin/gitleaks

      - name: Gitleaks detect (full repository)
        run: gitleaks detect --source . --verbose --redact
