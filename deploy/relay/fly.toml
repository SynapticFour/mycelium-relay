app = "mycelium-relay"
primary_region = "fra"

# Docker image: root Dockerfile.relay (see scripts/deploy-relay-fly.sh / CI).
[env]
RUST_LOG = "info,mycelium_relay=debug"
# Stable libp2p identity on /data (no OS keyring on Fly). Set once:
#   fly secrets set MYCELIUM_STORAGE_KEY="$(openssl rand -hex 32)" -a mycelium-relay
#
# libp2p TCP/4001 requires a dedicated IPv4 (shared ingress breaks raw TCP/noise):
#   fly ips allocate-v4 --yes -a mycelium-relay
# Bootstrap clients should dial the dedicated /ip4/… address (see bootstrap.rs).

# HTTP Health-Check (Port 8080 intern → 80/443 extern via Fly-Proxy)
[[services]]
protocol = "tcp"
internal_port = 8080

[[services.ports]]
port = 80
handlers = ["http"]

[[services.ports]]
port = 443
handlers = ["tls", "http"]

[[services.http_checks]]
interval = "30s"
timeout = "5s"
grace_period = "15s"
method = "GET"
path = "/health"

# libp2p TCP (direkt exposed, kein HTTP-Handler)
[[services]]
protocol = "tcp"
internal_port = 4001

[[services.ports]]
port = 4001

# QUIC/UDP für NAT-Traversal
[[services]]
protocol = "udp"
internal_port = 4001

[[services.ports]]
port = 4001

# Persistentes Volume für Keypair (Peer-ID bleibt stabil über Restarts)
[mounts]
source = "mycelium_relay_data"
destination = "/data"

[vm]
cpu_kind = "shared"
cpus = 1
memory_mb = 256
