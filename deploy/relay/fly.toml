app = "myc-relay-synfour"   # ← deinen gewählten Namen hier eintragen
primary_region = "fra"

# Docker image: root Dockerfile.relay (see scripts/deploy-relay-fly.sh / CI).
[env]
RUST_LOG = "info,mycelium_relay=debug"

# HTTP Health-Check (Port 8080 intern → 80/443 extern via Fly-Proxy)
[[services]]
protocol = "tcp"
internal_port = 8080

[[services.ports]]
port = 80
handlers = ["http"]

[[services.ports]]
port = 443
handlers = ["tls", "http"]

[[services.http_checks]]
interval = "30s"
timeout = "5s"
grace_period = "15s"
method = "GET"
path = "/health"

# libp2p TCP (direkt exposed, kein HTTP-Handler)
[[services]]
protocol = "tcp"
internal_port = 4001

[[services.ports]]
port = 4001

# QUIC/UDP für NAT-Traversal
[[services]]
protocol = "udp"
internal_port = 4001

[[services.ports]]
port = 4001

# Persistentes Volume für Keypair (Peer-ID bleibt stabil über Restarts)
[mounts]
source = "mycelium_relay_data"
destination = "/data"

[vm]
cpu_kind = "shared"
cpus = 1
memory_mb = 256
